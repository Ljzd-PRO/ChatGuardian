version: "3.9"

services:
  chat-guardian:
    build: .
    container_name: chat-guardian
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./db.sqlite:/app/db.sqlite
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
