version: "3.9"

services:
  chat-guardian:
    image: ghcr.io/ljzd-pro/chatguardian:manual
    container_name: chat-guardian
    ports:
      - "8000:8000"
    environment:
      - CHAT_GUARDIAN_DATABASE_URL=sqlite:///./data/db.sqlite
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
