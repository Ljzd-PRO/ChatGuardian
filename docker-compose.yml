version: "3.9"

services:
  chat-guardian:
    build: .
    container_name: chat-guardian
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # 可通过环境变量覆盖基础信息，默认从 .env 读取
      - CHAT_GUARDIAN_APP_NAME=${CHAT_GUARDIAN_APP_NAME:-ChatGuardian}
      - CHAT_GUARDIAN_ENVIRONMENT=${CHAT_GUARDIAN_ENVIRONMENT:-prod}
    volumes:
      - ./db.sqlite:/app/db.sqlite
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
