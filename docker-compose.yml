version: "3.9"

services:
  chatguardian:
    image: ghcr.io/ljzd-pro/chatguardian:latest
    container_name: chatguardian
    ports:
      - "8000:8000"
      - "2290:2290"
      - "8082:8082"
    environment:
      - CHAT_GUARDIAN_DATABASE_URL=sqlite:///./data/db.sqlite
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
