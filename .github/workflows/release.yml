name: Release

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.2.3 or v1.2.3-beta.1)"
        required: true
        type: string
      prerelease:
        description: "Override prerelease flag"
        required: false
        default: false
        type: boolean
      latest:
        description: "Whether Docker image should also be tagged as latest"
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  packages: write

jobs:
  resolve-release-config:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      prerelease: ${{ steps.resolve.outputs.prerelease }}
      latest: ${{ steps.resolve.outputs.latest }}
    steps:
      - name: Resolve tag and release flags
        id: resolve
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.tag }}"
            PRERELEASE="${{ inputs.prerelease }}"
            LATEST="${{ inputs.latest }}"
          else
            TAG="${GITHUB_REF_NAME}"
            if [[ "$TAG" =~ -beta(\.[0-9]+)?$ ]]; then
              PRERELEASE=true
              LATEST=false
            else
              PRERELEASE=false
              LATEST=true
            fi
          fi

          PRERELEASE=$(echo "${PRERELEASE}" | tr '[:upper:]' '[:lower:]')
          LATEST=$(echo "${LATEST}" | tr '[:upper:]' '[:lower:]')

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${PRERELEASE}" >> "$GITHUB_OUTPUT"
          echo "latest=${LATEST}" >> "$GITHUB_OUTPUT"

  build-image:
    needs: resolve-release-config
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/docker-image.yml
    with:
      tag: ${{ needs.resolve-release-config.outputs.tag }}
      publish: true
      latest: ${{ needs.resolve-release-config.outputs.latest == 'true' }}
    secrets: inherit

  create-release:
    runs-on: ubuntu-latest
    needs:
      - resolve-release-config
      - build-image
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-release-config.outputs.tag }}
          name: ${{ needs.resolve-release-config.outputs.tag }}
          body_path: CHANGELOG.md
          prerelease: ${{ needs.resolve-release-config.outputs.prerelease == 'true' }}
          generate_release_notes: false
