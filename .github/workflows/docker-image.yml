name: Docker Image

on:
  push:
    branches: [master]
    paths:
      - 'chat_guardian/**'
      - 'frontend/**'
      - 'tests/**'
  workflow_dispatch:
    inputs:
      tag:
        description: "Optional image tag (defaults to 'manual')"
        required: false
        default: ""
      publish:
        description: "Whether to push image to GHCR"
        required: false
        default: true
        type: boolean
  workflow_call:
    inputs:
      tag:
        description: "Image tag"
        required: false
        type: string
      publish:
        description: "Whether to push image to GHCR"
        required: false
        default: true
        type: boolean

env:
  # GitHub container registry requires lowercase repository names
  # We lowercase the owner at runtime in the `Define tags` step to avoid unsupported GH expression functions.
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/chatguardian

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Define tags
        id: vars
        run: |
          # Ensure owner is lowercase for ghcr tag requirements
          OWNER=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          IMAGE_NAME="ghcr.io/${OWNER}/chatguardian"

          # Push-triggered branch builds are validation-only by default.
          PUBLISH=true
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            PUBLISH=false
          elif [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            PUBLISH="${{ github.event.inputs.publish }}"
          elif [[ "${GITHUB_EVENT_NAME}" == "workflow_call" ]]; then
            PUBLISH="${{ inputs.publish }}"
          fi
          PUBLISH=$(echo "${PUBLISH}" | tr '[:upper:]' '[:lower:]')
          echo "publish=${PUBLISH}" >> "$GITHUB_OUTPUT"

          TAG=""
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          elif [[ "${GITHUB_EVENT_NAME}" == "workflow_call" ]]; then
            TAG="${{ inputs.tag }}"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME}"
          fi

          if [[ -z "$TAG" ]]; then
            if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" || "${GITHUB_EVENT_NAME}" == "workflow_call" ]]; then
              TAG="manual"
            else
              TAG="latest"
            fi
          fi

          echo "resolved-tag=${TAG}"
          echo "tags=${IMAGE_NAME}:${TAG}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: ${{ steps.vars.outputs.publish == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ steps.vars.outputs.publish == 'true' }}
          tags: ${{ steps.vars.outputs.tags }}
