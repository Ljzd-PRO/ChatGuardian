name: Docker Image

on:
  push:
    branches: [main]
    tags: ["*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Optional image tag (defaults to 'manual')"
        required: false
        default: ""

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/chatguardian

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Define tags
        id: vars
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.tag }}"
            if [[ -z "$TAG" ]]; then TAG="manual"; fi
            echo "tags=${IMAGE_NAME}:${TAG}" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME}"
            echo "tags=${IMAGE_NAME}:${TAG}" >> "$GITHUB_OUTPUT"
          else
            echo "tags=${IMAGE_NAME}:latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.vars.outputs.tags }}
