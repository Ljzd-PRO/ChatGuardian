name: Docker Image

on:
  push:
    branches: [master]
    paths:
      - 'chat_guardian/**'
      - 'frontend/**'
      - 'tests/**'
      - '.github/workflows/docker-image.yml'
      - 'Dockerfile'
  workflow_dispatch:
    inputs:
      tag:
        description: "Optional image tag (defaults to 'manual')"
        required: false
        default: ""
      publish:
        description: "Whether to push image to GHCR"
        required: false
        default: true
        type: boolean
      latest:
        description: "Whether to also tag image as latest"
        required: false
        default: false
        type: boolean

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/chatguardian

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Define tags and publish switch
        id: vars
        shell: bash
        run: |
          OWNER=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          IMAGE_NAME="ghcr.io/${OWNER}/chatguardian"

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            PUBLISH="${{ github.event.inputs.publish }}"
            TAG="${{ github.event.inputs.tag }}"
            LATEST="${{ github.event.inputs.latest }}"
            if [[ -z "$TAG" ]]; then
              TAG="manual"
            fi
          else
            # Push-triggered builds are validation-only.
            PUBLISH=false
            TAG="latest"
            LATEST=false
          fi

          PUBLISH=$(echo "${PUBLISH}" | tr '[:upper:]' '[:lower:]')
          LATEST=$(echo "${LATEST}" | tr '[:upper:]' '[:lower:]')
          echo "publish=${PUBLISH}" >> "$GITHUB_OUTPUT"

          TAGS="${IMAGE_NAME}:${TAG}"
          if [[ "${LATEST}" == "true" && "${TAG}" != "latest" ]]; then
            TAGS+=$'\n'"${IMAGE_NAME}:latest"
          fi
          {
            echo "tags<<EOF"
            echo "${TAGS}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: ${{ steps.vars.outputs.publish == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ steps.vars.outputs.publish == 'true' }}
          tags: ${{ steps.vars.outputs.tags }}
